name: "Deploy para VPS"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - dev

jobs:
  build_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v3

      - name: "Copia arquivos via SSH"
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.IP_SERVER_NERDY }}
          username: "root"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          key_format: base64
          source: "."
          target: "/root/Nerdy"  # ← Caminho absoluto
      
      - name: "Matar processos antigos"
        uses: appleboy/ssh-action@v1
        timeout-minutes: 5
        with:
          host: ${{ secrets.IP_SERVER_NERDY }}
          username: "root"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          key_format: base64
          script: |
            pkill -f "python3.*MiniMim.py" || true
            pkill -f "python3.*main.py" || true
            sleep 2

      - name: "Setup e Dependências"
        uses: appleboy/ssh-action@v1
        timeout-minutes: 10
        with:
          host: ${{ secrets.IP_SERVER_NERDY }}
          username: "root"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          key_format: base64
          script: |
            cd /root/Nerdy
            
            # Instalar dependências (ajusta conforme seu SO)
            apt-get update && apt-get install -y python3-pip python3-venv || \
            apk add --no-cache python3 py3-pip
            
            # Criar venv
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            # Init DB
            python3 /root/Nerdy/nerdy_web/Aplicacao_WEB/database/init_db.py || {
              echo "Erro no init_db.py"
              exit 1
            }
      
      - name: "Iniciar Aplicação"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.IP_SERVER_NERDY }}
          username: "root"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          key_format: base64
          script: |
            cd /root/Nerdy
            source venv/bin/activate
            
            # MiniMim
            nohup python3 MiniMim/MiniMim.py > /tmp/minimim.log 2>&1 &
            
            # Web App
            nohup python3 nerdy_web/Aplicacao_WEB/main.py > /tmp/nerdy.log 2>&1 &
            
            sleep 2