name: "Deploy para VPS"
on:
  push:
    branches:
      - dev

jobs:
  build_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: "Baixa o codigo"
        uses: actions/checkout@v4
        
      - name: "Copia arquivos via SSH"
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.IP_SERVER_NERDY }}
          username: "root"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          key_format: base64
          source: "."
          target: Nerdy
      
      - name: "Configuração"
        uses: appleboy/ssh-action@v1
        timeout-minutes: 5
        with:
          host: ${{ secrets.IP_SERVER_NERDY }}
          username: "root"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          key_format: base64
          source: "."
          script: |
            apk add --no-cache py3-pip  # py3-pip, não só "pip"
      
            # Mata processos antigos (se existirem)
            pkill -f "python3 MiniMim/MiniMim.py" || true
            pkill -f "python3 nerdy_web/Aplicacao_WEB/main.py" || true

            cd Nerdy
            python3 -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt
            
            python3 nerdy_web/Aplicacao_WEB/database/init_db.py
            
      - name: "Iniciar Aplicação e MiniMim"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.IP_SERVER_NERDY }}
          username: "root"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          key_format: base64
          source: "."
          script: |
            # Roda em background e mantém mesmo após SSH fechar
            nohup python3 MiniMim/MiniMim.py > /var/log/minimim.log 2>&1 &
            nohup python3 nerdy_web/Aplicacao_WEB/main.py > /var/log/nerdy.log 2>&1 &